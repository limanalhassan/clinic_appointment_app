apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "liman.fullname" . }}-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "liman.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "liman.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "liman.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: web
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - gunicorn
            - clinic.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "4"
            - --timeout
            - "120"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "liman.fullname" . }}-config
            - secretRef:
                name: {{ .Values.externalSecret.name }}
          readinessProbe:
            httpGet:
              path: {{ .Values.web.healthPath }}
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.web.healthPath }}
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
