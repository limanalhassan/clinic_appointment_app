image:
  repository: ""  # set to ECR URL at deploy time: <account>.dkr.ecr.ca-central-1.amazonaws.com/liman
  tag: latest
  pullPolicy: IfNotPresent

namespace: liman

serviceAccount:
  name: liman-app

# Non-sensitive env vars — mounted as ConfigMap
config:
  djangoSettingsModule: clinic.settings.base
  debug: "False"
  allowedHosts: "api.limanalhassan.work"
  celeryBrokerUrl: "sqs://"
  sqsQueueName: clinic-tasks
  awsDefaultRegion: ca-central-1
  defaultFromEmail: noreply@limanalhassan.work
  emailBackend: django_ses.SESBackend
  smsBackend: console

# Name of the Kubernetes Secret created outside the chart.
# Must contain: SECRET_KEY, DATABASE_URL
externalSecret:
  name: liman-app-secret

web:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthPath: /api/

worker:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

beat:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

hpa:
  minReplicas: 2
  maxReplicas: 10
  cpuTargetPercent: 70

keda:
  queueUrl: ""  # set at deploy time: https://sqs.ca-central-1.amazonaws.com/<account>/clinic-tasks
  awsRegion: ca-central-1
  minReplicas: 0
  maxReplicas: 10
  targetQueueLength: "10"

ingress:
  host: dev.limanalhassan.work
  ingressClassName: alb
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/load-balancer-name: liman-app-alb
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=60
    alb.ingress.kubernetes.io/healthcheck-path: /hello
    alb.ingress.kubernetes.io/success-codes: "200-399"
  path: /
  pathType: Prefix
