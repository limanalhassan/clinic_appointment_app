image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

namespace: clinic

serviceAccount:
  name: clinic-app

config:
  djangoSettingsModule: clinic.settings.production
  debug: "False"
  allowedHosts: ""
  celeryBrokerUrl: "sqs://"
  sqsQueueName: ""
  sqsQueueUrl: ""
  awsDefaultRegion: ""
  defaultFromEmail: ""
  emailBackend: django.core.mail.backends.console.EmailBackend
  smsBackend: console

externalSecret:
  name: clinic-app-secret

web:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  healthPath: /health/

worker:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

beat:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

hpa:
  minReplicas: 1
  maxReplicas: 10
  cpuTargetPercent: 70

keda:
  queueUrl: ""
  awsRegion: ""
  minReplicas: 0
  maxReplicas: 10
  targetQueueLength: "10"

ingress:
  host: ""
  ingressClassName: alb
  annotations: {}
  path: /
  pathType: Prefix
