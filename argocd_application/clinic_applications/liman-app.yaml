apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clinic-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:limanalhassan/clinic_appointment_app.git
    targetRevision: master
    path: helm/liman
  destination:
    server: https://kubernetes.default.svc
    namespace: liman
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
