apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:limanalhassan/clinic_appointment_app.git
    targetRevision: master
    path: argocd_application/nodes
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
