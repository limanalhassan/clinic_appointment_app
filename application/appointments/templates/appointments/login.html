<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Liman</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .liman-logo {
      width: 52px; height: 52px;
      background: #0891b2;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }

    .liman-logo svg { width: 28px; height: 28px; }

    .brand-name {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #0f172a;
      text-align: center;
    }

    .brand-tagline {
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .form-label { font-size: 0.82rem; font-weight: 600; color: #374151; }

    .form-control {
      border-radius: 8px;
      border: 1.5px solid #e2e8f0;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
    }

    .form-control:focus {
      border-color: #0891b2;
      box-shadow: 0 0 0 3px rgba(8,145,178,0.12);
    }

    .btn-liman {
      background: #0891b2;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.7rem;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      width: 100%;
      transition: background 0.15s;
    }

    .btn-liman:hover { background: #0e7490; color: white; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: #b91c1c;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="liman-logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="2" width="4" height="24" rx="2" fill="white"/>
          <rect x="2" y="12" width="24" height="4" rx="2" fill="white"/>
        </svg>
      </div>
      <div class="brand-name">LIMAN</div>
      <div class="brand-tagline">Clinic Management Platform</div>

      {% if form.errors %}
        <div class="error-msg">Invalid username or password. Please try again.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required />
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-liman">Sign In</button>
        <input type="hidden" name="next" value="{{ next }}" />
      </form>
    </div>
  </div>
</body>
</html>
