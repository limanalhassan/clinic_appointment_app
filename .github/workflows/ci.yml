name: CI

on:
  push:
    branches: [master]
    paths:
      - 'application/**'
  pull_request:
    branches: [master]
    paths:
      - 'application/**'

env:
  AWS_REGION: ca-central-1
  ECR_REGISTRY: 316865756768.dkr.ecr.ca-central-1.amazonaws.com
  ECR_REPOSITORY: liman

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: clinic_test
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: application/requirements.txt

      - name: Install dependencies
        run: pip install -r application/requirements.txt

      - name: Run tests
        working-directory: application
        env:
          SECRET_KEY: ci-only-not-used-in-production
          DATABASE_URL: postgres://clinic:clinic@localhost:5432/clinic_test
          CELERY_BROKER_URL: sqs://
          DJANGO_SETTINGS_MODULE: clinic.settings.test
        run: pytest

  build-push:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::316865756768:role/liman-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: application
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.value }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push to ECR
        run: docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.value }}

      - name: Update image tag in Helm values
        run: |
          sed -i "s/^  tag: .*/  tag: \"${{ steps.tag.outputs.value }}\"/" argocd_application/values/clinic/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd_application/values/clinic/values.yaml
          git commit -m "ci: update clinic image tag to ${{ steps.tag.outputs.value }}"
          git push
