name: Helm Publish

on:
  push:
    branches: [master]
    paths:
      - 'helm/**'
      - '!helm/clinic/values.yaml'

env:
  AWS_REGION: ca-central-1
  ECR_REGISTRY: 316865756768.dkr.ecr.ca-central-1.amazonaws.com
  CHART_PATH: helm/clinic

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::316865756768:role/liman-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR (Helm)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Read chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Package chart
        run: helm package ${{ env.CHART_PATH }}

      - name: Push chart to ECR
        run: |
          helm push clinic-${{ steps.chart.outputs.version }}.tgz \
            oci://${{ env.ECR_REGISTRY }}/helm_artifacts
