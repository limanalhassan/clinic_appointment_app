name: Helm Publish

on:
  push:
    branches: [master]
    paths:
      - 'helm/**'
      - '!helm/clinic/values.yaml'

env:
  CHART_PATH: helm/clinic
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Read chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Package chart
        run: helm package ${{ env.CHART_PATH }}

      - name: Push chart to GHCR
        run: |
          helm push clinic-${{ steps.chart.outputs.version }}.tgz \
            oci://${{ env.REGISTRY_NAMESPACE }}

      - name: Update targetRevision in ArgoCD app
        run: |
          sed -i "s/targetRevision: [0-9]*\.[0-9]*\.[0-9]*/targetRevision: ${{ steps.chart.outputs.version }}/" \
            argocd_application/clinic_applications/clinic-app.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd_application/clinic_applications/clinic-app.yaml
          git commit -m "ci: update clinic chart targetRevision to ${{ steps.chart.outputs.version }}"
          git push
